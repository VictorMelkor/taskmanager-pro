<nav class="navbar" style="
    background-color: #2d3748;

    display: flex;
    justify-content: space-between;
    align-items: center;
">
    <h1 class="header-title" style="margin: 0; font-size: 24px;">
    {% if user.is_authenticated %}
        <a href="{% url 'pages:dashboard' %}" style="
            color: inherit;
            text-decoration: none;

        ">TaskManager Pro</a>
    {% else %}
        <a href="{% url 'pages:home' %}" style="
            color: inherit;
            text-decoration: none;
            font-weight: bold;
        ">TaskManager Pro</a>
    {% endif %}
    </h1>
    <div>
        <ul style="
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 20px;
            align-items: center;
        ">

                <li><a href="{% url 'pages:dashboard' %}" style="
                    color: white;
                    text-decoration: none;
                    font-weight: 600;
                    font-size: 16px;
                    transition: color 0.3s;
                " onmouseover="this.style.color='#3182ce'" onmouseout="this.style.color='white'">Meus quadros</a></li>
                <li><a href="{% url 'userauth:custom_logout' %}" style="

                    font-weight: 600;

                    transition: color 0.3s;
                " onmouseover="this.style.color='#3182ce'" onmouseout="this.style.color='white'">Sair</a></li>
