{% extends 'base.html' %}

{% block content %}
<div class="main-content">
    <h2>Organize suas tarefas com eficiência e simplicidade</h2>
    <p>Com o TaskManager Pro, você pode planejar, acompanhar e concluir suas atividades de forma visual, prática e intuitiva. Tudo em um só lugar.</p>
    <div class="buttons">
        <a href="{% url 'userauth:login' %}" class="btn btn-login">Login</a>
        <a href="{% url 'userauth:signup' %}" class="btn btn-signup">Criar Conta</a>
    </div>
</div>

<style>
    .main-content {
        max-width: none;       /* remove limite fixo */
        width: 70vw;           /* ocupa 70% da viewport horizontal */
        margin: 80px auto;
        text-align: center;
        background: white;
        padding: 40px 30px;
        border-radius: 8px;
        box-shadow: 0 0 15px rgba(0,0,0,0.1);
        box-sizing: border-box; /* garante que padding não aumente largura */
        min-width: 320px;      /* largura mínima para evitar ficar muito estreito */
}
    h2 {
        margin-bottom: 20px;
        font-weight: 700;
        color: #2d3748;
    }
    p {
        margin-bottom: 30px;
        color: #4a5568;
        font-size: 1.1rem;
        line-height: 1.5;
    }
    .buttons {
        display: flex;
        justify-content: center;
        gap: 20px;
    }
    .btn {
        display: inline-block;
        padding: 12px 28px;
        font-size: 1rem;
        font-weight: 600;
        border-radius: 6px;
        text-decoration: none;
        cursor: pointer;
        transition: background-color 0.3s ease;
    }
    .btn-login {
        background-color: #3182ce;
        color: white;
        border: none;
    }
    .btn-login:hover {
        background-color: #2b6cb0;
    }
    .btn-signup {
        background-color: #48bb78;
        color: white;
        border: none;
    }
    .btn-signup:hover {
        background-color: #38a169;
    }
</style>
{% endblock %}
